type Conversation implements Node {
  avatar: String
  id: ID!
  kind: ConversationKind!
  lastMessage: Message
  messages(after: String, before: String, first: Int, last: Int): ConversationMessagesConnection!

  """A list of all past and present participations in this conversation."""
  participations: [ConversationParticipation!]!
  title: String
}

enum ConversationKind {
  GROUP
  PRIVATE
}

type ConversationMessagesConnection {
  edges: [ConversationMessagesConnectionEdge]
  pageInfo: PageInfo!
}

type ConversationMessagesConnectionEdge {
  cursor: String!
  node: Message
}

type ConversationParticipation implements Node {
  conversation: Conversation!
  id: ID!
  identity: Identity!
  joinedAt: DateTime!
  role: ConversationParticipationRole!
  state: ConversationParticipationState!
}

enum ConversationParticipationRole {
  ADMIN
  MEMBER
}

enum ConversationParticipationState {
  ACTIVE
  LEFT
}

"""
A date-time string at UTC, such as 2007-12-03T10:15:30Z, compliant with the `date-time` format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar DateTime

type Identity implements Node {
  address: String!
  avatar: String!
  id: ID!
  name: String

  """The conversation participations done by this identity"""
  participations(after: String, before: String, first: Int, last: Int): IdentityParticipationsConnection!
}

type IdentityParticipationsConnection {
  edges: [IdentityParticipationsConnectionEdge]
  pageInfo: PageInfo!
}

type IdentityParticipationsConnectionEdge {
  cursor: String!
  node: ConversationParticipation
}

type Message implements Node {
  conversation: Conversation!
  createdAt: DateTime!
  deliveries: [MessageDelivery!]!
  hasRawHTML: Boolean
  html: String
  id: ID!
  plainText: String
  rawHTML: String
  sender: Identity!
  snippet: String
}

type MessageDelivery implements Node {
  id: ID!
  recipient: Identity!
  transport: MessageDeliveryTransport!
}

enum MessageDeliveryTransport {
  DIRECT
  EMAIL
}

interface Node {
  id: ID!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

type Query {
  node(id: ID!): Node
  nodes(ids: [ID!]!): [Node]!
  viewer: Viewer
}

type Viewer implements Node {
  avatar: String!
  id: ID!
  identity: Identity!
  name: String!
}
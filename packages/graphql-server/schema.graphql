"""
A date-time string at UTC, such as 2007-12-03T10:15:30Z, compliant with the `date-time` format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar DateTime

type EmailAddressRef implements Node {
  address: String!
  avatar: String!
  id: ID!
  isSelf: Boolean!
  name: String!
}

type EmailConversation implements Node {
  avatar: String
  id: ID!
  kind: EmailConversationKind!
  lastMessage: EmailMessage!
  messages(after: String, before: String, first: Int, last: Int): EmailConversationMessagesConnection!
  participations: [EmailConversationParticipation!]!
  title: String
  unseenCount: Int!
}

enum EmailConversationKind {
  GROUP
  PRIVATE
}

type EmailConversationMessagesConnection {
  edges: [EmailConversationMessagesConnectionEdge!]!
  pageInfo: PageInfo!
}

type EmailConversationMessagesConnectionEdge {
  cursor: String!
  node: EmailMessage!
}

type EmailConversationParticipation {
  conversation: EmailConversation!
  emailAddressRef: EmailAddressRef!
}

type EmailMessage implements Node {
  createdAt: DateTime!
  from: EmailAddressRef!
  html: String
  id: ID!
  snippet: String
  to: EmailAddressRef!
}

interface Node {
  id: ID!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

type Query {
  node(id: ID!): Node
  nodes(ids: [ID!]!): [Node]!
  viewer: Viewer
}

type Viewer {
  avatar: String!
  emailAddress: String!
  emailConversations(after: String, before: String, first: Int, last: Int): ViewerEmailConversationsConnection!
  id: ID!
  name: String!
}

type ViewerEmailConversationsConnection {
  edges: [ViewerEmailConversationsConnectionEdge!]!
  pageInfo: PageInfo!
}

type ViewerEmailConversationsConnectionEdge {
  cursor: String!
  node: EmailConversation!
}
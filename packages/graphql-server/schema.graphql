type Identity implements Node {
  address: String!
  avatar: String!
  id: ID!
  name: String
}

interface Node {
  id: ID!
}

type Query {
  node(id: ID!): Node
  nodes(ids: [ID!]!): [Node]!
  viewer: Viewer
}

type Viewer implements Node {
  avatar: String!
  id: ID!
  identity: Identity!
  name: String!
}
scalar DateTime

interface Node {
	id: ID!
}

interface Edge {
	cursor: String
	node: Node!
}

type PageInfo {
	startCursor: String
	endCursor: String
	hasNextPage: Boolean
	hasPreviousPage: Boolean
}

interface Connection {
	pageInfo: PageInfo!
	edges: [Edge!]!
}

enum ConversationKind {
	PRIVATE
	GROUP
}

enum IdentityKind {
	GEBNA_USER
	EXTERNAL_EMAIL
}

"""
Conversation placement for the viewer.
Purely organizational (no gating).
"""
enum Mailbox {
	IMPORTANT
	TRASH
}

enum ParticipantRole {
	MEMBER
	ADMIN
}

enum ParticipantState {
	ACTIVE
	LEFT
}

enum Transport {
	EMAIL
	GEBNA_DM
}

enum DeliveryStatus {
	QUEUED
	SENT
	DELIVERED
	READ
	FAILED
}

type Identity implements Node {
	id: ID!

	"""
	Canonical address-like identifier.
	Examples:
	- "alice@gebna.net"
	- "bob@gmail.com"
	"""
	address: String!

	kind: IdentityKind!
	name: String
	avatar: String!

	"""
	Viewer-scoped relationship metadata (contacts).
	Always resolved.
	"""
	relationshipToViewer: IdentityRelationship
}

type IdentityRelationship implements Node {
	"""
	Stable viewer-scoped relationship id.
	Virtual or persisted depending on implementation.
	"""
	id: ID!

	"""
	Whether the viewer saved this identity as a contact.
	"""
	isContact: Boolean!

	"""
	Viewer-scoped display metadata.
	Empty string allowed when not customized.
	"""
	displayName: String
	avatarUrl: String
}

type Conversation implements Node {
	id: ID!
	kind: ConversationKind!
	title: String
	participants: [ConversationParticipant!]!
	lastMessage: Message!
	updatedAt: DateTime!
	viewerState: ConversationViewerState!
	messages(last: Int!, before: String): MessageConnection!
}

type ConversationParticipant {
	identity: Identity!
	role: ParticipantRole!
	state: ParticipantState!
	joinedAt: DateTime!

	"""
	Last message read by this participant.
	Use a sentinel ID if none.
	"""
	lastReadMessageId: ID
}

type ConversationViewerState {
	mailbox: Mailbox!
	unreadCount: Int!
}

type Message implements Node {
	id: ID!

	conversationId: ID!

	sender: Identity!

	bodyText: String
	bodyHTML: String
	bodyMD: String
	hasHTML: Boolean!
	createdAt: DateTime!

	delivery: [DeliveryReceipt!]!
}

type DeliveryReceipt {
	recipient: Identity!
	status: DeliveryStatus!
	latestStatusChangeAt: DateTime!
	error: String
	transport: Transport!
}

type ConversationConnection implements Connection {
	edges: [ConversationEdge!]!
	pageInfo: PageInfo!
}

type ConversationEdge implements Edge {
	cursor: String!
	node: Conversation!
}

type MessageConnection implements Connection {
	edges: [MessageEdge!]!
	pageInfo: PageInfo!
}

type MessageEdge implements Edge {
	cursor: String!
	node: Message!
}

type IdentityConnection implements Connection {
	edges: [IdentityEdge!]!
	pageInfo: PageInfo!
}

type IdentityEdge implements Edge {
	cursor: String!
	node: Identity!
}

type Viewer implements Node {
	id: ID!
	username: String!
	name: String!
	avatar: String!

	identity: Identity!

	conversations(mailbox: Mailbox!, first: Int!, after: String): ConversationConnection!

	"""
	List of saved contacts.
	"""
	contacts(query: String, first: Int!, after: String): IdentityConnection!
}

type Query {
	viewer: Viewer
	node(id: ID!): Node
}

input UpsertConversationInput {
	kind: ConversationKind!

	"""
	For PRIVATE: exactly 1 address (the other participant).
	Viewer is implied.
	For GROUP: N addresses; viewer is implied.
	"""
	participantAddresses: [String!]!

	title: String!
}

type UpsertConversationPayload {
	conversation: Conversation!
	created: Boolean!
}

input SendMessageInput {
	conversationId: ID!
	bodyMD: String!
}

type RecipientTransportDecision {
	recipient: Identity!
	chosen: Transport!
	reason: String!
}

input MarkConversationReadInput {
	conversationId: ID!
	lastReadMessageId: ID!
}

input SetContactStatusInput {
	identityId: ID!
	isContact: Boolean!
	displayName: String
	avatarUrl: String
}

input MoveConversationInput {
	conversationId: ID!
	mailbox: Mailbox!
}

input AddConversationParticipantsInput {
	conversationId: ID!
	participantAddresses: [String!]!
}

type Greeting {
	greeting: String
}

type Mutation {
	upsertConversation(input: UpsertConversationInput!): UpsertConversationPayload!
	addConversationParticipants(input: AddConversationParticipantsInput!): Conversation
	sendMessage(input: SendMessageInput!): Message!
	markConversationRead(id: ID!): Conversation!

	setContactStatus(input: SetContactStatusInput!): Identity
	moveConversation(input: MoveConversationInput!): Conversation

	greet(greeting: String!): String
}

type Subscription {
	messageAdded(conversationId: ID!): Message!

	greetings(greeting: String): Greeting
}

type Query {
	viewer: User
	node(id: ID!): Node
	search(input: SearchInput!): SearchResult
}

type Mutation {
	assignTargetMailbox(input: AssignTargetMailboxInput!): Contact
	markThreadSeen(id: ID!): Thread
	editUser(input: EditUserInput!): User
	editThread(input: EditThreadInput!): Thread
}

input SearchInput {
	query: String!
	mailboxId: ID
	limit: Int
	offset: Int
}

type SearchResult {
	messages: [Message!]!
}

input AssignTargetMailboxInput {
	contactID: ID!
	targetMailboxType: MailboxType!
}

input EditUserInput {
	name: String
	avatar: File
}

input EditThreadInput {
	id: ID!
	title: String!
}

type User implements Node {
	id: ID!
	username: String!
	name: String!
	avatar: String!
	mailbox(type: MailboxType!): Mailbox
	mailboxes: [Mailbox!]!
	attachments(first: Int, after: String, filter: AttachmentsFilter): AttachmentsConnection!
	contacts(first: Int, after: String): ContactsConnection!
}

type Mailbox implements Node {
	id: ID!
	type: MailboxType!
	name: String!
	unseenThreadsCount: Int!
	threads(first: Int, after: String, filter: ThreadsFilter): ThreadsConnection!
	assignedContactsCount: Int!
	contacts(first: Int, after: String): ContactsConnection!
}

enum MailboxType {
	screener
	important
	news
	transactional
	trash
}

input ThreadsFilter {
	unseen: Boolean!
}

type ThreadsConnection implements Connection {
	pageInfo: PageInfo!
	edges: [ThreadEdge!]!
}

type ThreadEdge implements Edge {
	cursor: String
	node: Thread!
}

type Thread implements Node {
	id: ID!
	from: Contact!
	unseenMessagesCount: Int!
	title: String
	snippet: String
	lastMessageAt: DateTime!
	messages: [Message!]!
	mailbox: Mailbox!
}

type Message implements Node {
	id: ID!
	threadId: ID!
	from: Contact!
	unseen: Boolean!
	recievedAt: DateTime!
	subject: String
	to: [String!]
	cc: [String!]
	replyTo: [String!]
	snippet: String
	bodyText: String
	bodyHTML: String
	attachments: [Attachment!]!
}

type ContactsConnection implements Connection {
	pageInfo: PageInfo!
	edges: [ContactEdge!]!
}

type ContactEdge implements Edge {
	cursor: String
	node: Contact!
}

type Contact implements Node {
	id: ID!
	address: String!
	name: String!
	avatar: String!
	targetMailbox: Mailbox!
	firstMessage: Message
	threads(first: Int, after: String): ThreadsConnection!
	attachments(first: Int, after: String): AttachmentsConnection!
}

enum AttachmentType {
	Image
	PDF
	CalendarInvite
	Document
	Spreadsheet
	Presentation
	Media
	ZIP
	Other
}

input AttachmentsFilter {
	attachmentType: AttachmentType
	contactAddress: EmailAddress
}

type AttachmentsConnection implements Connection {
	pageInfo: PageInfo!
	edges: [AttachmentEdge!]!
}

type AttachmentEdge implements Edge {
	cursor: String
	node: Attachment!
}

type Attachment implements Node {
	id: ID!
	fileName: String
	mimeType: String!
	contentId: String
	url: String!
	sizeInBytes: Int!
	createdAt: DateTime!
	thumbnail: String
	type: AttachmentType!
}

interface Connection {
	pageInfo: PageInfo!
	edges: [Edge!]!
}

type PageInfo {
	startCursor: String
	endCursor: String
	hasNextPage: Boolean
	hasPreviousPage: Boolean
}

interface Edge {
	cursor: String
	node: Node!
}

interface Node {
	id: ID!
}

scalar DateTime
scalar URL
scalar File
scalar EmailAddress
